<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="480" viewBox="0 0 1600 520" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="omniGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#6EA8FE"/>
<stop offset="100%" stop-color="#8B5CF6"/>
</linearGradient>
<radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#6EA8FE" stop-opacity="0.35"/>
<stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
</radialGradient>
</defs>
<!-- glow -->
<circle cx="260" cy="260" r="140" fill="url(#coreGlow)"/>
<!-- intelligence core ring -->
<circle
cx="260"
cy="260"
r="120"
stroke="url(#omniGradient)"
stroke-width="16"
fill="none"
/>
<!-- neural orbit -->
<ellipse
cx="260"
cy="260"
rx="180"
ry="90"
stroke="url(#omniGradient)"
stroke-width="14"
fill="none"
/>
<!-- orbit nodes -->
<circle cx="120" cy="260" r="10" fill="#6EA8FE"/>
<circle cx="400" cy="260" r="10" fill="#8B5CF6"/>
<!-- OM monogram with infinity integration -->
<path
d="
M210 260
C210 210 260 210 260 260
C260 310 310 310 310 260
"
stroke="url(#omniGradient)"
stroke-width="18"
fill="none"
stroke-linecap="round"
/>
<path
d="
M260 260
C260 210 310 210 310 260
"
stroke="url(#omniGradient)"
stroke-width="18"
fill="none"
stroke-linecap="round"
/>
<!-- hidden neural node center -->
<circle cx="260" cy="260" r="6" fill="#6EA8FE"/>
<!-- wordmark -->
<text
x="500"
y="300"
font-family="Inter, Poppins, Segoe UI, sans-serif"
font-size="140"
letter-spacing="2"
fill="url(#omniGradient)"
font-weight="600"
>
OmniMind
</text>
</svg>
